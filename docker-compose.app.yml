services:
  app:
    image: open-spanner:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPEN_SPANNER_HTTP_ADDR: :18081
      OPEN_SPANNER_GRPC_ADDR: :18090
      OPEN_SPANNER_DB_DRIVER: postgres
      OPEN_SPANNER_POSTGRES_DSN: postgres://open_spanner:${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}@postgres:5432/open_spanner?sslmode=disable
      OPEN_SPANNER_EXPORT_STORAGE_PATH: /data/exports
      OPEN_SPANNER_RETENTION_PRUNE_ENABLED: ${OPEN_SPANNER_RETENTION_PRUNE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - open-spanner-app-exports:/data/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:18081/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${OPEN_SPANNER_HTTP_PORT:-18081}:18081"
      - "${OPEN_SPANNER_GRPC_PORT:-18090}:18090"
    restart: unless-stopped

  export-worker:
    image: open-spanner:local
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/open-spanner-export-worker"]
    environment:
      OPEN_SPANNER_DB_DRIVER: postgres
      OPEN_SPANNER_POSTGRES_DSN: postgres://open_spanner:${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}@postgres:5432/open_spanner?sslmode=disable
      OPEN_SPANNER_EXPORT_STORAGE_PATH: /data/exports
      OPEN_SPANNER_EXPORT_WORKER_INTERVAL: ${OPEN_SPANNER_EXPORT_WORKER_INTERVAL:-5s}
      OPEN_SPANNER_EXPORT_WORKER_LOCK_TTL: ${OPEN_SPANNER_EXPORT_WORKER_LOCK_TTL:-5m}
      OPEN_SPANNER_EXPORT_WORKER_TIMEOUT: ${OPEN_SPANNER_EXPORT_WORKER_TIMEOUT:-10m}
      OPEN_SPANNER_EXPORT_WORKER_MAX_ATTEMPTS: ${OPEN_SPANNER_EXPORT_WORKER_MAX_ATTEMPTS:-3}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - open-spanner-app-exports:/data/exports
    restart: unless-stopped

  alert-worker:
    image: open-spanner:local
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/open-spanner-alert-worker"]
    environment:
      OPEN_SPANNER_DB_DRIVER: postgres
      OPEN_SPANNER_POSTGRES_DSN: postgres://open_spanner:${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}@postgres:5432/open_spanner?sslmode=disable
      OPEN_SPANNER_ALERT_WORKER_INTERVAL: ${OPEN_SPANNER_ALERT_WORKER_INTERVAL:-5s}
      OPEN_SPANNER_ALERT_WORKER_LOCK_TTL: ${OPEN_SPANNER_ALERT_WORKER_LOCK_TTL:-5m}
      OPEN_SPANNER_ALERT_WORKER_TIMEOUT: ${OPEN_SPANNER_ALERT_WORKER_TIMEOUT:-1m}
      OPEN_SPANNER_ALERT_WORKER_RETRY_AFTER: ${OPEN_SPANNER_ALERT_WORKER_RETRY_AFTER:-30s}
      OPEN_SPANNER_ALERT_WORKER_MAX_ATTEMPTS: ${OPEN_SPANNER_ALERT_WORKER_MAX_ATTEMPTS:-3}
      OPEN_SPANNER_ALERT_WORKER_BATCH_SIZE: ${OPEN_SPANNER_ALERT_WORKER_BATCH_SIZE:-100}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  entitlement-worker:
    image: open-spanner:local
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/open-spanner-entitlement-worker"]
    environment:
      OPEN_SPANNER_DB_DRIVER: postgres
      OPEN_SPANNER_POSTGRES_DSN: postgres://open_spanner:${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}@postgres:5432/open_spanner?sslmode=disable
      OPEN_SPANNER_ENTITLEMENT_WORKER_INTERVAL: ${OPEN_SPANNER_ENTITLEMENT_WORKER_INTERVAL:-5s}
      OPEN_SPANNER_ENTITLEMENT_WORKER_LOCK_TTL: ${OPEN_SPANNER_ENTITLEMENT_WORKER_LOCK_TTL:-5m}
      OPEN_SPANNER_ENTITLEMENT_WORKER_TIMEOUT: ${OPEN_SPANNER_ENTITLEMENT_WORKER_TIMEOUT:-1m}
      OPEN_SPANNER_ENTITLEMENT_WORKER_RETRY_AFTER: ${OPEN_SPANNER_ENTITLEMENT_WORKER_RETRY_AFTER:-30s}
      OPEN_SPANNER_ENTITLEMENT_WORKER_MAX_ATTEMPTS: ${OPEN_SPANNER_ENTITLEMENT_WORKER_MAX_ATTEMPTS:-3}
      OPEN_SPANNER_ENTITLEMENT_WORKER_BATCH_SIZE: ${OPEN_SPANNER_ENTITLEMENT_WORKER_BATCH_SIZE:-100}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: open_spanner
      POSTGRES_PASSWORD: ${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}
      POSTGRES_DB: open_spanner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_spanner -d open_spanner"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - open-spanner-app-postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  open-spanner-app-postgres:
  open-spanner-app-exports:
