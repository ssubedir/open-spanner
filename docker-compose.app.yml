services:
  app:
    image: open-spanner:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPEN_SPANNER_HTTP_ADDR: :18081
      OPEN_SPANNER_DB_DRIVER: postgres
      OPEN_SPANNER_POSTGRES_DSN: postgres://open_spanner:${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}@postgres:5432/open_spanner?sslmode=disable
      OPEN_SPANNER_RETENTION_PRUNE_ENABLED: ${OPEN_SPANNER_RETENTION_PRUNE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:18081/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${OPEN_SPANNER_HTTP_PORT:-18081}:18081"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: open_spanner
      POSTGRES_PASSWORD: ${OPEN_SPANNER_POSTGRES_PASSWORD:-open_spanner}
      POSTGRES_DB: open_spanner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_spanner -d open_spanner"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - open-spanner-app-postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  open-spanner-app-postgres:
