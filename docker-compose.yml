services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: open_spanner
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_spanner"]
      interval: 2s
      timeout: 5s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - open-spanner-postgres:/var/lib/postgresql/data

volumes:
  open-spanner-postgres:
