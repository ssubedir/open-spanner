version: v2

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: .
    opt:
      - module=github.com/ssubedir/open-spanner
  - remote: buf.build/grpc/go:v1.5.1
    out: .
    opt:
      - module=github.com/ssubedir/open-spanner
      - require_unimplemented_servers=false
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: sdk/go
    opt:
      - module=github.com/ssubedir/open-spanner/sdk/go
      - Mopen_spanner/v1/usage.proto=github.com/ssubedir/open-spanner/sdk/go/grpc/pb
  - remote: buf.build/grpc/go:v1.5.1
    out: sdk/go
    opt:
      - module=github.com/ssubedir/open-spanner/sdk/go
      - require_unimplemented_servers=false
      - Mopen_spanner/v1/usage.proto=github.com/ssubedir/open-spanner/sdk/go/grpc/pb
  - remote: buf.build/community/stephenh-ts-proto
    out: sdk/typescript/src/grpc/pb
    opt:
      - env=node
      - esModuleInterop=true
      - forceLong=string
      - importSuffix=.js
      - outputServices=grpc-js
      - useDate=true
      - useExactTypes=false
  - remote: buf.build/protocolbuffers/python:v33.1
    out: sdk/python/open_spanner_client/grpc/pb
  - remote: buf.build/grpc/python:v1.76.0
    out: sdk/python/open_spanner_client/grpc/pb
  - remote: buf.build/protocolbuffers/csharp:v33.1
    out: sdk/csharp/grpc/pb
  - remote: buf.build/grpc/csharp:v1.76.0
    out: sdk/csharp/grpc/pb
