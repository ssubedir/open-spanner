version: '3'

tasks:
  release:version:
    desc: Update SDK package versions before a release, for example task release:version VERSION=0.1.4
    requires:
      vars: [VERSION]
    cmds:
      - node scripts/set-release-version.mjs {{.VERSION}}

  release:check:
    desc: Verify tests, generated OpenAPI docs, and all SDK packages before a release
    cmds:
      - task: test
      - task: test:examples
      - task: sdk:go:check
      - task: sdk:typescript:check
      - task: sdk:python:pack
      - task: sdk:csharp:pack
      - git diff --exit-code openapi sdk/go sdk/typescript sdk/python sdk/python-client.yml sdk/csharp examples dotnet-tools.json
