version: '3'

tasks:
  sdk:go:
    desc: Generate the Go SDK from Swagger docs
    cmds:
      - task: openapi:sdk
      - node scripts/remove-paths.mjs sdk/go/client sdk/go/models
      - go run github.com/go-swagger/go-swagger/cmd/swagger@v0.34.1 generate client -f openapi/sdk-swagger.json -t sdk/go -A open-spanner --default-scheme http
      - cd sdk/go; go mod tidy

  sdk:go:test:
    desc: Test the generated Go SDK
    cmds:
      - cd sdk/go; go test ./...

  sdk:go:check:
    desc: Verify generated Go SDK is up to date
    cmds:
      - task: sdk:go
      - git diff --exit-code openapi sdk/go

  sdk:python:
    desc: Generate the Python SDK from OpenAPI docs
    cmds:
      - task: openapi:sdk
      - node scripts/remove-paths.mjs sdk/python/open_spanner_client/__init__.py sdk/python/open_spanner_client/api sdk/python/open_spanner_client/models sdk/python/open_spanner_client/client.py sdk/python/open_spanner_client/errors.py sdk/python/open_spanner_client/py.typed sdk/python/open_spanner_client/types.py sdk/python/README.md sdk/python/pyproject.toml
      - uvx --from openapi-python-client==0.29.0 openapi-python-client generate --path openapi/sdk-openapi.json --output-path sdk/python --meta uv --config sdk/python-client.yml --overwrite
      - node scripts/finalize-python-sdk.mjs
      - node scripts/trim-trailing-whitespace.mjs sdk/python/open_spanner_client
      - cd sdk/python; uv lock

  sdk:python:test:
    desc: Test the generated Python SDK
    cmds:
      - cd sdk/python; uv run python -c "import open_spanner_client"
      - cd sdk/python; uv run python -m compileall open_spanner_client

  sdk:python:check:
    desc: Verify generated Python SDK is up to date
    cmds:
      - task: sdk:python
      - git diff --exit-code openapi sdk/python sdk/python-client.yml

  sdk:python:build:
    desc: Build the Python SDK package
    cmds:
      - task: sdk:python:check
      - task: sdk:python:test
      - cd sdk/python; uv build

  sdk:python:pack:
    desc: Verify the Python SDK package builds
    cmds:
      - task: sdk:python:build

  sdk:csharp:
    desc: Generate and build the C# SDK from OpenAPI docs
    cmds:
      - task: openapi:sdk
      - dotnet tool restore
      - node scripts/remove-paths.mjs sdk/csharp/src
      - dotnet tool run kiota -- generate -d openapi/sdk-openapi.json -l CSharp -o sdk/csharp/src -n OpenSpanner -c OpenSpannerClient --clean-output --exclude-backward-compatible
      - node scripts/trim-trailing-whitespace.mjs sdk/csharp/src
      - node scripts/remove-paths.mjs sdk/csharp/src/.kiota.log
      - dotnet build sdk/csharp/OpenSpanner.csproj

  sdk:csharp:test:
    desc: Test the C# SDK package
    cmds:
      - dotnet build sdk/csharp/OpenSpanner.csproj

  sdk:csharp:check:
    desc: Verify generated C# SDK is up to date
    cmds:
      - task: sdk:csharp
      - task: sdk:csharp:test
      - git diff --exit-code openapi sdk/csharp dotnet-tools.json

  sdk:csharp:pack:
    desc: Verify the C# SDK NuGet package builds
    cmds:
      - task: sdk:csharp:check
      - dotnet pack sdk/csharp/OpenSpanner.csproj --configuration Release

  sdk:typescript:
    desc: Generate and build the TypeScript SDK package
    cmds:
      - task: openapi:sdk
      - node scripts/remove-paths.mjs sdk/typescript/src/client.gen.ts sdk/typescript/src/client sdk/typescript/src/core sdk/typescript/src/index.ts sdk/typescript/src/sdk.gen.ts sdk/typescript/src/types.gen.ts
      - cd sdk/typescript; npm ci
      - cd sdk/typescript; npm run generate
      - cd sdk/typescript; npm run build

  sdk:typescript:test:
    desc: Test the TypeScript SDK package
    cmds:
      - cd sdk/typescript; npm test

  sdk:typescript:check:
    desc: Verify the TypeScript SDK package builds and tests
    cmds:
      - task: sdk:typescript
      - task: sdk:typescript:test
      - git diff --exit-code openapi sdk/typescript

  sdk:typescript:pack:
    desc: Verify the TypeScript SDK npm package contents
    cmds:
      - task: sdk:typescript:check
      - cd sdk/typescript; npm run pack:dry-run

  sdk:typescript:publish:
    desc: Publish the TypeScript SDK package to npm
    cmds:
      - task: sdk:typescript:check
      - cd sdk/typescript; npm run pack:dry-run
      - cd sdk/typescript; npm run publish:sdk
