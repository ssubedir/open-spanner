version: '3'

tasks:
  test:
    desc: Run all Go tests
    cmds:
      - go test -count=1 ./...

  test:postgres:
    desc: Run Postgres API integration tests
    cmds:
      - task: postgres:up
      - go test ./internal/metering/bootstrap -run TestIntegrationPostgres -count=1
    env:
      OPEN_SPANNER_TEST_POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/open_spanner?sslmode=disable

  test:e2e:
    desc: Run browser E2E tests across supported storage backends
    cmds:
      - task: test:e2e:web
      - task: test:e2e:web:postgres

  test:e2e:web:
    desc: Run Playwright browser E2E tests for the admin UI with SQLite
    cmds:
      - cd web; npm run e2e

  test:e2e:web:postgres:
    desc: Run Playwright browser E2E tests for the admin UI with Postgres
    cmds:
      - task: postgres:up
      - task: _test:e2e:postgres:reset
      - cd web; npm run e2e
    env:
      OPEN_SPANNER_E2E_DB_DRIVER: postgres
      OPEN_SPANNER_E2E_POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/open_spanner_e2e?sslmode=disable

  test:e2e:web:install:
    desc: Install Playwright browser dependencies for admin UI E2E tests
    cmds:
      - cd web; npm run e2e:install

  test:examples:
    desc: Verify local SDK examples compile and build without calling the API
    cmds:
      - task: test:examples:rest
      - task: test:examples:stream

  test:sdk:
    desc: Run SDK integration tests against a local Open Spanner service
    cmds:
      - task: test:sdk:go
      - task: test:sdk:typescript
      - task: test:sdk:python
      - task: test:sdk:csharp

  test:sdk:go:
    desc: Run Go SDK integration tests against a local Open Spanner service
    cmds:
      - cd sdk/tests/go; go test ./... -count=1

  test:sdk:typescript:
    desc: Run TypeScript SDK integration tests against a local Open Spanner service
    cmds:
      - cd sdk/typescript; npm run test:stream

  test:sdk:python:
    desc: Run Python SDK integration tests against a local Open Spanner service
    cmds:
      - cd sdk/python; uv run python ../tests/python/stream_integration_test.py

  test:sdk:csharp:
    desc: Run C# SDK integration tests against a local Open Spanner service
    cmds:
      - dotnet run --project sdk/tests/csharp/OpenSpanner.StreamIntegration.csproj

  test:examples:rest:
    desc: Verify all REST SDK examples
    cmds:
      - task: test:examples:rest:basic
      - task: test:examples:rest:advance

  test:examples:stream:
    desc: Verify all streaming SDK examples
    cmds:
      - task: test:examples:stream:basic:go
      - task: test:examples:stream:advance

  test:examples:rest:basic:
    desc: Verify all basic REST SDK examples
    cmds:
      - task: test:examples:rest:basic:go
      - task: test:examples:rest:basic:csharp
      - task: test:examples:rest:basic:python
      - task: test:examples:rest:basic:typescript

  test:examples:rest:basic:go:
    desc: Verify the basic REST Go example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/basic/go

  test:examples:stream:basic:go:
    desc: Verify the basic Go gRPC stream example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/stream/basic/go

  test:examples:stream:advance:
    desc: Verify all advanced Go gRPC stream examples
    cmds:
      - task: test:examples:stream:advance:device-telemetry
      - task: test:examples:stream:advance:websocket-sessions
      - task: test:examples:stream:advance:queue-consumer

  test:examples:stream:advance:device-telemetry:
    desc: Verify the device telemetry advanced Go gRPC stream example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/stream/advance/device-telemetry

  test:examples:stream:advance:websocket-sessions:
    desc: Verify the WebSocket sessions advanced Go gRPC stream example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/stream/advance/websocket-sessions

  test:examples:stream:advance:queue-consumer:
    desc: Verify the queue consumer advanced Go gRPC stream example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/stream/advance/queue-consumer

  test:examples:rest:basic:csharp:
    desc: Verify the basic REST C# example
    cmds:
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/basic/csharp/OpenSpanner.Example.csproj

  test:examples:rest:basic:python:
    desc: Verify the basic REST Python example
    cmds:
      - task: _test:example:python
        vars:
          FILE: examples/rest/basic/python/basic.py

  test:examples:rest:basic:typescript:
    desc: Verify the basic REST TypeScript example
    cmds:
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/basic/typescript/tsconfig.json

  test:examples:rest:advance:
    desc: Verify all advanced REST scenario examples
    cmds:
      - task: test:examples:rest:advance:active-users
      - task: test:examples:rest:advance:ai-tokens
      - task: test:examples:rest:advance:api-requests
      - task: test:examples:rest:advance:background-jobs
      - task: test:examples:rest:advance:feature-usage
      - task: test:examples:rest:advance:historical-backfill
      - task: test:examples:rest:advance:storage-usage

  test:examples:rest:advance:active-users:
    desc: Verify the active users advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/active-users
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/active-users/OpenSpanner.ActiveUsers.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/active-users/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/active-users/tsconfig.json

  test:examples:rest:advance:ai-tokens:
    desc: Verify the AI tokens advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/ai-tokens
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/ai-tokens/OpenSpanner.AiTokens.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/ai-tokens/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/ai-tokens/tsconfig.json

  test:examples:rest:advance:api-requests:
    desc: Verify the API requests advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/api-requests
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/api-requests/OpenSpanner.ApiRequests.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/api-requests/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/api-requests/tsconfig.json

  test:examples:rest:advance:background-jobs:
    desc: Verify the background jobs advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/background-jobs
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/background-jobs/OpenSpanner.BackgroundJobs.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/background-jobs/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/background-jobs/tsconfig.json

  test:examples:rest:advance:feature-usage:
    desc: Verify the feature usage advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/feature-usage
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/feature-usage/OpenSpanner.FeatureUsage.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/feature-usage/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/feature-usage/tsconfig.json

  test:examples:rest:advance:historical-backfill:
    desc: Verify the historical backfill advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/historical-backfill
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/historical-backfill/OpenSpanner.HistoricalBackfill.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/historical-backfill/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/historical-backfill/tsconfig.json

  test:examples:rest:advance:storage-usage:
    desc: Verify the storage usage advanced REST example
    cmds:
      - task: _test:example:go
        vars:
          DIR: examples/rest/advance/storage-usage
      - task: _test:example:csharp
        vars:
          PROJECT: examples/rest/advance/storage-usage/OpenSpanner.StorageUsage.csproj
      - task: _test:example:python
        vars:
          FILE: examples/rest/advance/storage-usage/python.py
      - task: _test:example:typescript
        vars:
          CONFIG: examples/rest/advance/storage-usage/tsconfig.json

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  _test:example:go:
    internal: true
    cmds:
      - cd {{.DIR}}; go test ./...

  _test:example:csharp:
    internal: true
    cmds:
      - dotnet build {{.PROJECT}}

  _test:example:python:
    internal: true
    cmds:
      - uv run --isolated --with-editable ./sdk/python python -c "import open_spanner_client"
      - uv run --isolated --with-editable ./sdk/python python -m py_compile {{.FILE}}

  _test:example:typescript:
    internal: true
    cmds:
      - task: _test:example:typescript:deps
      - node sdk/typescript/node_modules/typescript/bin/tsc --noEmit -p {{.CONFIG}}

  _test:example:typescript:deps:
    internal: true
    status:
      - node -e "require('node:fs').existsSync('sdk/typescript/node_modules/typescript/bin/tsc') || process.exit(1)"
    cmds:
      - cd sdk/typescript; npm ci

  _test:e2e:postgres:reset:
    internal: true
    cmds:
      - docker compose exec -T postgres psql -U postgres -d postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'open_spanner_e2e';"
      - docker compose exec -T postgres psql -U postgres -d postgres -c "DROP DATABASE IF EXISTS open_spanner_e2e;"
      - docker compose exec -T postgres psql -U postgres -d postgres -c "CREATE DATABASE open_spanner_e2e;"
