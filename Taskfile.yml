version: '3'

tasks:
  default:
    desc: Run tests
    cmds:
      - task: test

  run:
    desc: Run the API server
    cmds:
      - go run ./cmd/api

  run:sqlite:
    desc: Run the API server with SQLite storage
    env:
      OPEN_SPANNER_DB_DRIVER: sqlite
      OPEN_SPANNER_SQLITE_PATH: open-spanner.db
    cmds:
      - go run ./cmd/api

  run:memory:
    desc: Run the API server with in-memory storage
    env:
      OPEN_SPANNER_DB_DRIVER: memory
    cmds:
      - go run ./cmd/api

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  admin:dev:
    desc: Run the React admin UI dev server
    cmds:
      - cd web; npm run dev

  admin:build:
    desc: Build the React admin UI into embedded static files
    cmds:
      - cd web; npm run build

  docs:
    desc: Generate Swagger docs
    cmds:
      - go run github.com/swaggo/swag/cmd/swag@v1.16.6 init -g cmd/api/main.go -o docs --parseDependency --parseInternal

  docs:check:
    desc: Verify generated Swagger docs are up to date
    cmds:
      - task: docs
      - git diff --exit-code docs

  docs:openapi:
    desc: Generate OpenAPI 3 docs from Swagger docs
    cmds:
      - task: docs
      - npx --yes swagger2openapi@7.0.8 docs/swagger.json -o docs/openapi.json --patch

  docs:sdk:
    desc: Generate SDK-friendly API docs
    cmds:
      - task: docs:openapi
      - node scripts/normalize-sdk-specs.mjs docs/swagger.json docs/sdk-swagger.json
      - node scripts/normalize-sdk-specs.mjs docs/openapi.json docs/sdk-openapi.json

  sdk:go:
    desc: Generate the Go SDK from Swagger docs
    cmds:
      - task: docs:sdk
      - powershell -NoProfile -Command "if (Test-Path 'sdk/go/client') { Remove-Item 'sdk/go/client' -Recurse -Force }"
      - powershell -NoProfile -Command "if (Test-Path 'sdk/go/models') { Remove-Item 'sdk/go/models' -Recurse -Force }"
      - go run github.com/go-swagger/go-swagger/cmd/swagger@v0.34.1 generate client -f docs/sdk-swagger.json -t sdk/go -A open-spanner --default-scheme http
      - cd sdk/go; go mod tidy

  sdk:go:test:
    desc: Test the generated Go SDK
    cmds:
      - cd sdk/go; go test ./...

  sdk:go:check:
    desc: Verify generated Go SDK is up to date
    cmds:
      - task: sdk:go
      - git diff --exit-code docs sdk/go

  sdk:python:
    desc: Generate the Python SDK from OpenAPI docs
    cmds:
      - task: docs:sdk
      - node scripts/remove-paths.mjs sdk/python/open_spanner_client sdk/python/README.md sdk/python/pyproject.toml
      - uvx --from openapi-python-client==0.29.0 openapi-python-client generate --path docs/sdk-openapi.json --output-path sdk/python --meta uv --config sdk/python-client.yml --overwrite
      - node scripts/finalize-python-sdk.mjs
      - cd sdk/python; uv lock

  sdk:python:test:
    desc: Test the generated Python SDK
    cmds:
      - cd sdk/python; uv run python -c "import open_spanner_client"
      - cd sdk/python; uv run python -m compileall open_spanner_client

  sdk:python:check:
    desc: Verify generated Python SDK is up to date
    cmds:
      - task: sdk:python
      - git diff --exit-code docs sdk/python sdk/python-client.yml

  sdk:python:build:
    desc: Build the Python SDK package
    cmds:
      - task: sdk:python:check
      - task: sdk:python:test
      - cd sdk/python; uv build

  sdk:python:pack:
    desc: Verify the Python SDK package builds
    cmds:
      - task: sdk:python:build

  sdk:csharp:
    desc: Generate and build the C# SDK from OpenAPI docs
    cmds:
      - task: docs:sdk
      - dotnet tool restore
      - node scripts/remove-paths.mjs sdk/csharp/src
      - dotnet tool run kiota -- generate -d docs/sdk-openapi.json -l CSharp -o sdk/csharp/src -n OpenSpanner -c OpenSpannerClient --clean-output --exclude-backward-compatible
      - node scripts/remove-paths.mjs sdk/csharp/src/.kiota.log
      - dotnet build sdk/csharp/OpenSpanner.csproj

  sdk:csharp:test:
    desc: Test the C# SDK package
    cmds:
      - dotnet build sdk/csharp/OpenSpanner.csproj

  sdk:csharp:check:
    desc: Verify generated C# SDK is up to date
    cmds:
      - task: sdk:csharp
      - task: sdk:csharp:test
      - git diff --exit-code docs sdk/csharp examples/csharp dotnet-tools.json

  sdk:csharp:pack:
    desc: Verify the C# SDK NuGet package builds
    cmds:
      - task: sdk:csharp:test
      - dotnet pack sdk/csharp/OpenSpanner.csproj --configuration Release

  sdk:typescript:
    desc: Generate and build the TypeScript SDK package
    cmds:
      - task: docs:sdk
      - cd sdk/typescript; npm ci
      - cd sdk/typescript; npm run generate
      - cd sdk/typescript; npm run build

  sdk:typescript:test:
    desc: Test the TypeScript SDK package
    cmds:
      - cd sdk/typescript; npm test

  sdk:typescript:check:
    desc: Verify the TypeScript SDK package builds and tests
    cmds:
      - task: sdk:typescript
      - task: sdk:typescript:test
      - git diff --exit-code docs sdk/typescript

  sdk:typescript:pack:
    desc: Verify the TypeScript SDK npm package contents
    cmds:
      - task: sdk:typescript
      - cd sdk/typescript; npm run pack:dry-run

  sdk:typescript:publish:
    desc: Publish the TypeScript SDK package to npm
    cmds:
      - task: sdk:typescript:check
      - cd sdk/typescript; npm run pack:dry-run
      - cd sdk/typescript; npm run publish:sdk
