name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      sdks: ${{ steps.filter.outputs.sdks }}
      admin: ${{ steps.filter.outputs.admin }}
      browser: ${{ steps.filter.outputs.browser }}
      docs: ${{ steps.filter.outputs.docs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed files
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "api=true"
              echo "sdks=true"
              echo "admin=true"
              echo "browser=true"
              echo "docs=true"
            } >> "$GITHUB_OUTPUT"

            {
              echo "### Changed areas"
              echo
              echo "Manual dispatch runs all checks."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-list --max-parents=0 "$AFTER")"
          fi

          CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"

          set_area() {
            local name="$1"
            local pattern="$2"

            if printf '%s\n' "$CHANGED_FILES" | grep -Eq "$pattern"; then
              echo "$name=true" >> "$GITHUB_OUTPUT"
              echo "- $name: yes" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "$name=false" >> "$GITHUB_OUTPUT"
              echo "- $name: no" >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          {
            echo "### Changed areas"
            echo
            echo "Compared \`$BEFORE\` to \`$AFTER\`."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          SHARED='^\.github/workflows/ci\.yml$|^Taskfile\.yml$|^taskfiles/|^scripts/'
          BACKEND='^cmd/|^internal/|^go\.mod$|^go\.sum$|^sqlc\.yaml$|^openapi/|^docker-compose.*\.yml$|^Dockerfile$'
          SDKS='^sdk/|^examples/|^openapi/|^dotnet-tools\.json$'
          ADMIN='^web/|^internal/ui/'
          DOCS='^docs/'

          set_area api "$SHARED|$BACKEND"
          set_area sdks "$SHARED|$SDKS"
          set_area admin "$SHARED|$ADMIN"
          set_area browser "$SHARED|$BACKEND|$ADMIN"
          set_area docs "^\\.github/workflows/ci\\.yml$|$DOCS"

  api:
    name: API checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Task
        run: npm install --global @go-task/cli

      - name: Validate Taskfile includes
        run: task --list

      - name: Run Go tests
        run: task test

      - name: Run Go vet
        run: task vet

      - name: Check generated SQL accessors
        run: task sqlc:check

      - name: Check generated OpenAPI docs
        run: task openapi:check

  sdks:
    name: SDK and example checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.sdks == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            sdk/typescript/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Use locked npm version
        run: npm install --global npm@11.6.2

      - name: Install Task
        run: npm install --global @go-task/cli

      - name: Validate Taskfile includes
        run: task --list

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: npm ci

      - name: Test Go SDK
        run: task sdk:go:test

      - name: Test TypeScript SDK
        run: task sdk:typescript:test

      - name: Test Python SDK
        run: task sdk:python:test

      - name: Test C# SDK
        run: task sdk:csharp:test

      - name: Test local examples
        run: task test:examples

  admin:
    name: Admin UI build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.admin == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Use locked npm version
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build admin UI
        working-directory: web
        run: npm run build

  browser:
    name: Browser E2E
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.browser == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Use locked npm version
        run: npm install --global npm@11.6.2

      - name: Install Task
        run: npm install --global @go-task/cli

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: task test:e2e:web

      - name: Run browser E2E with Postgres
        run: task test:e2e:web:postgres

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Use locked npm version
        run: npm install --global npm@11.6.2

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Type check docs
        working-directory: docs
        run: npm run types:check

      - name: Build docs
        working-directory: docs
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /open-spanner
          NEXT_PUBLIC_SITE_URL: https://ssubedir.github.io/open-spanner
