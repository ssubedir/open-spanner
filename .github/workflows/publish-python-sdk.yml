name: Publish Python SDK

on:
  workflow_dispatch:
  push:
    tags:
      - "sdk-python-v*"

concurrency:
  group: publish-python-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Require release owner
        if: github.actor != 'ssubedir'
        run: |
          echo "Only @ssubedir can run release workflows."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Use locked npm version
        run: npm install --global npm@11.6.2

      - name: Install Task
        run: npm install --global @go-task/cli

      - name: Validate Taskfile includes
        run: task --list

      - name: Verify release artifacts
        run: task release:check

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-python-v}"
          PACKAGE_VERSION="$(python -c "import tomllib; print(tomllib.load(open('sdk/python/pyproject.toml', 'rb'))['project']['version'])")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION pyproject.toml=$PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish Python SDK
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist
